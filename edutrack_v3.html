<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduTrack</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Light palette — warm white with indigo/violet accents */
  --bg:         #f5f4f7;
  --bg2:        #eeedf2;
  --surface:    #ffffff;
  --surface2:   #f9f8fc;
  --border:     #e8e6ef;
  --border2:    #d5d2e4;
  --text:       #1a1830;
  --text2:      #4b4869;
  --muted:      #9691b0;
  --muted2:     #c4c0d8;
  /* Brand */
  --accent:     #5b4af7;
  --accent-lt:  #ede9ff;
  --accent2:    #00b4c8;
  --accent2-lt: #e0f7fa;
  --green:      #05b67a;
  --green-lt:   #dcf7ee;
  --yellow:     #e8900c;
  --yellow-lt:  #fff3dc;
  --red:        #e83a3a;
  --red-lt:     #ffeaea;
  --orange:     #e86422;
  --blue:       #2e78e8;
  --purple:     #8b5cf6;
  /* Mono */
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Plus Jakarta Sans', system-ui, sans-serif;
  /* Shadows */
  --shadow-sm:  0 1px 3px rgba(60,50,100,0.07), 0 1px 2px rgba(60,50,100,0.04);
  --shadow:     0 4px 12px rgba(60,50,100,0.09), 0 1px 4px rgba(60,50,100,0.05);
  --shadow-lg:  0 16px 48px rgba(60,50,100,0.13), 0 4px 16px rgba(60,50,100,0.07);
  --shadow-xl:  0 32px 80px rgba(60,50,100,0.18), 0 8px 24px rgba(60,50,100,0.1);
}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;scroll-behavior:smooth}
body{background:var(--bg);font-family:var(--sans);color:var(--text);min-height:100vh}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--border2)}

/* ── Layout ── */
.layout{display:flex;min-height:100vh}
.sidebar{
  width:240px;flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;overflow-y:auto;
  box-shadow:var(--shadow-sm);
  z-index:50;
}
.content{flex:1;min-width:0;display:flex;flex-direction:column}

/* ── Sidebar ── */
.sidebar-top{padding:20px 16px 12px}
.logo{display:flex;align-items:center;gap:9px;margin-bottom:20px;text-decoration:none}
.logo-mark{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#5b4af7 0%,#00b4c8 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:#fff;font-weight:900;
  box-shadow:0 4px 12px rgba(91,74,247,0.35);
}
.logo-name{font-size:16px;font-weight:800;letter-spacing:-.025em;color:var(--text)}

/* Profile card in sidebar */
.profile-card{
  background:linear-gradient(135deg,var(--accent-lt) 0%,var(--accent2-lt) 100%);
  border:1px solid rgba(91,74,247,.15);
  border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer;
  transition:box-shadow .2s,transform .15s;
}
.profile-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.profile-avatar{
  width:46px;height:46px;border-radius:12px;margin-bottom:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;color:#fff;
  border:2.5px solid rgba(255,255,255,.8);
  box-shadow:0 4px 14px rgba(91,74,247,.3);
  overflow:hidden;flex-shrink:0;
}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.profile-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.2}
.profile-detail{font-size:11px;color:var(--text2);margin-top:2px}
.profile-gpa-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.profile-gpa-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(255,255,255,.7);
  border:1px solid rgba(91,74,247,.2);
  border-radius:99px;padding:3px 9px;
  font-size:11px;font-weight:700;color:var(--accent);
  font-family:var(--mono);
}

/* Nav items */
.nav-section-label{font-size:10px;font-weight:700;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase;padding:16px 16px 6px}
.nav-item{
  display:flex;align-items:center;gap:9px;
  padding:8px 12px;margin:1px 8px;
  border-radius:9px;cursor:pointer;
  font-size:13px;font-weight:500;color:var(--text2);
  transition:background .13s,color .13s;border:none;background:transparent;
  width:calc(100% - 16px);text-align:left;font-family:var(--sans);
}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--accent-lt);color:var(--accent);font-weight:600}
.nav-item.active .nav-icon{opacity:1}
.nav-icon{font-size:15px;opacity:.6;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;border-radius:99px;font-size:9px;font-weight:700;padding:2px 6px;font-family:var(--mono)}

/* Sidebar stats at bottom */
.sidebar-stats{margin-top:auto;padding:12px;border-top:1px solid var(--border)}
.sidebar-stat-row{display:flex;justify-content:space-between;align-items:center;padding:4px 4px}
.sidebar-stat-label{font-size:11px;color:var(--muted)}
.sidebar-stat-value{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text2)}

/* ── Topbar ── */
.topbar{
  background:rgba(245,244,247,.88);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 28px;position:sticky;top:0;z-index:40;
  height:56px;display:flex;align-items:center;justify-content:space-between;
}
.topbar-title{font-size:15px;font-weight:700;letter-spacing:-.015em;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:8px}

/* ── Main ── */
.main{flex:1;padding:28px 32px 80px;max-width:960px;width:100%}

/* ── Cards ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  box-shadow:var(--shadow-sm);
  overflow:hidden;
  transition:box-shadow .2s,border-color .2s;
}
.card:hover{box-shadow:var(--shadow);border-color:var(--border2)}
.card-pad{padding:20px 24px}
.card-header{
  padding:14px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;user-select:none;transition:background .13s;
}
.card-header:hover{background:var(--surface2)}

/* ── Metric cards ── */
.metric-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:18px 20px;
  box-shadow:var(--shadow-sm);position:relative;overflow:hidden;
  transition:box-shadow .2s,transform .15s;
}
.metric-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.metric-card-accent{position:absolute;top:0;left:0;right:0;height:3px;border-radius:99px 99px 0 0}
.metric-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.metric-value{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--text);line-height:1}
.metric-sub{font-size:11px;color:var(--muted);margin-top:5px}

/* ── GPA Ring ── */
.ring-wrap{position:relative;flex-shrink:0}

/* ── Badges ── */
.grade-chip{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:34px;padding:2px 7px;border-radius:6px;
  font-family:var(--mono);font-size:11px;font-weight:600;
  border:1.5px solid;white-space:nowrap;cursor:pointer;
  transition:filter .12s,transform .1s,box-shadow .12s;
}
.grade-chip:hover{filter:brightness(.96);transform:scale(1.06);box-shadow:var(--shadow-sm)}

.rank-pill{
  display:inline-flex;align-items:center;padding:4px 14px;border-radius:99px;
  font-size:12px;font-weight:700;letter-spacing:.02em;
}

/* ── Progress ── */
.prog-track{height:7px;background:var(--bg2);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width 1.6s cubic-bezier(.4,0,.2,1)}

/* ── Semester badge ── */
.sem-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:6px;
  font-family:var(--mono);font-size:11px;font-weight:600;
}

/* ── Course row ── */
.course-row{
  display:flex;align-items:center;gap:10px;
  padding:7px 10px;border-radius:9px;
  border:1px solid transparent;margin-bottom:3px;
  transition:background .1s,border-color .1s;
}
.course-row:hover{background:var(--surface2);border-color:var(--border)}
.credit-pill{
  width:24px;height:24px;border-radius:6px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:10px;font-weight:700;
}

/* ── Grade select ── */
.grade-sel{
  background:var(--surface2);border:1.5px solid var(--border2);
  color:var(--text);border-radius:7px;font-size:11px;padding:3px 7px;
  font-family:var(--mono);cursor:pointer;outline:none;
  transition:border-color .15s;
}
.grade-sel:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,74,247,.12)}

/* ── Buttons ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;padding:8px 16px;
  border-radius:9px;border:none;font-size:13px;font-family:var(--sans);
  font-weight:600;cursor:pointer;transition:all .15s;line-height:1;
}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(91,74,247,.3)}
.btn-primary:hover{background:#4e3fe8;box-shadow:0 4px 16px rgba(91,74,247,.4)}
.btn-secondary{background:var(--surface);color:var(--text2);border:1.5px solid var(--border2)}
.btn-secondary:hover{background:var(--bg);border-color:var(--border2);color:var(--text)}
.btn-ghost{background:transparent;color:var(--muted);padding:6px 10px}
.btn-ghost:hover{background:var(--bg);color:var(--text2)}
.btn-danger{background:var(--red-lt);color:var(--red);border:1px solid rgba(232,58,58,.2)}
.btn-danger:hover{background:#ffd6d6}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:7px}
.btn-icon{width:30px;height:30px;padding:0;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:13px}

/* ── Modal ── */
.overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(26,24,48,.45);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;padding:20px;
  animation:fadeIn .18s ease;
}
.modal{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:20px;padding:28px 30px;width:100%;max-width:460px;
  max-height:90vh;overflow-y:auto;
  box-shadow:var(--shadow-xl);
  animation:slideUp .22s cubic-bezier(.4,0,.2,1);
}
.modal-xl{max-width:560px}
.modal-title{font-size:17px;font-weight:800;letter-spacing:-.02em;color:var(--text);margin-bottom:20px;display:flex;align-items:center;gap:9px}
.field{margin-bottom:16px}
.field-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.field-input{
  width:100%;background:var(--surface2);border:1.5px solid var(--border2);
  border-radius:9px;padding:9px 13px;color:var(--text);font-size:14px;
  font-family:var(--sans);outline:none;transition:border-color .15s,box-shadow .15s;
}
.field-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,74,247,.12)}
.field-select{
  width:100%;background:var(--surface2);border:1.5px solid var(--border2);
  border-radius:9px;padding:9px 13px;color:var(--text);font-size:14px;
  font-family:var(--sans);outline:none;cursor:pointer;
  transition:border-color .15s;appearance:auto;
}
.field-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,74,247,.12)}

/* ── Drag ── */
.drag-handle{color:var(--muted2);font-size:14px;cursor:grab;flex-shrink:0}
.drag-handle:active{cursor:grabbing}
.chip-dragging{opacity:.3}
.drop-active{background:rgba(91,74,247,.04)!important;border:1.5px dashed rgba(91,74,247,.4)!important}

/* ── Planner chip ── */
.plan-chip{
  display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:9px;
  background:var(--surface2);border:1.5px solid var(--border);margin-bottom:4px;
  transition:all .12s;user-select:none;
}
.plan-chip:hover{background:var(--accent-lt);border-color:rgba(91,74,247,.3)}

/* ── GPA bars ── */
.bars-wrap{display:flex;align-items:flex-end;gap:8px}
.bar-col{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-val{font-family:var(--mono);font-size:9px;font-weight:600;line-height:1}
.bar-bg{width:100%;display:flex;align-items:flex-end}
.bar-fill{width:100%;border-radius:5px 5px 0 0;transition:height 1.5s cubic-bezier(.4,0,.2,1)}
.bar-label{font-size:8px;color:var(--muted2);text-align:center;line-height:1.3}

/* ── Timeline ── */
.timeline{display:flex;overflow-x:auto;padding-bottom:4px}
.tl-cell{min-width:86px;padding:0 14px;border-left:1px solid var(--border);flex-shrink:0}
.tl-cell:first-child{border-left:none;padding-left:0}

/* ── Toast ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:999;
  background:var(--text);color:#fff;border-radius:10px;
  padding:10px 18px;font-size:13px;font-weight:500;
  box-shadow:var(--shadow-lg);white-space:nowrap;
  animation:slideUp .2s cubic-bezier(.4,0,.2,1);
}

/* ── Search ── */
.search-wrap{position:relative}
.search-input{
  background:var(--surface);border:1.5px solid var(--border2);
  border-radius:9px;padding:7px 12px 7px 34px;color:var(--text);
  font-size:13px;font-family:var(--sans);outline:none;
  transition:border-color .15s,width .2s;width:200px;
}
.search-input:focus{border-color:var(--accent);width:260px;box-shadow:0 0 0 3px rgba(91,74,247,.1)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted)}

/* ── Animations ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:slideUp .32s cubic-bezier(.4,0,.2,1) both}

/* ── Avatar upload zone ── */
.avatar-zone{
  width:80px;height:80px;border-radius:18px;
  background:linear-gradient(135deg,var(--accent-lt),var(--accent2-lt));
  border:2px dashed var(--border2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;overflow:hidden;position:relative;
  transition:border-color .15s,box-shadow .15s;
}
.avatar-zone:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,74,247,.12)}
.avatar-zone img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.avatar-zone-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;text-align:center;line-height:1.4;z-index:1}

/* ── Section label ── */
.section-label{font-size:10px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}

/* ── Divider ── */
.div{height:1px;background:var(--border);margin:4px 0}

/* ── Sem grid ── */
.sem-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:14px}

/* ── Empty ── */
.empty{text-align:center;padding:24px 0;font-size:13px;color:var(--muted2);border:1.5px dashed var(--border);border-radius:9px}

/* ── Info chip (profile page) ── */
.info-chip{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  background:var(--surface2);border:1px solid var(--border);border-radius:11px;
  transition:border-color .15s;
}
.info-chip:hover{border-color:var(--border2)}
.info-chip-icon{font-size:18px;flex-shrink:0}
.info-chip-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.info-chip-value{font-size:13px;font-weight:600;color:var(--text);margin-top:1px}
</style>
</head>
<body>
<div id="root" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:14px;color:#9691b0;font-family:system-ui">
  <div style="width:28px;height:28px;border:2.5px solid #e8e6ef;border-top-color:#5b4af7;border-radius:50%;animation:sp .7s linear infinite"></div>
  <style>@keyframes sp{to{transform:rotate(360deg)}}</style>
  Đang tải EduTrack…
</div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

/* ══════════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════════ */
const GP = {'A+':4,'A':4,'B+':3.5,'B':3,'C+':2.5,'C':2,'D+':1.5,'D':1,'F':0};
const GRADE_OPTS = ['A+','A','B+','B','C+','C','D+','D','F'];

const gradeColor = g => {
  if (!g || g==='-' || GP[g]===undefined)
    return {c:'#9691b0',bg:'#f3f2f8',bd:'#d5d2e4'};
  const p = GP[g];
  if(p>=4)   return {c:'#05a36d',bg:'#dcf7ee',bd:'#b3edd9'};
  if(p>=3.5) return {c:'#2e78e8',bg:'#e8f1ff',bd:'#b8d0f7'};
  if(p>=3)   return {c:'#7c3aed',bg:'#ede9ff',bd:'#c9b8f7'};
  if(p>=2.5) return {c:'#c87c00',bg:'#fff3dc',bd:'#f7d898'};
  if(p>=2)   return {c:'#e86422',bg:'#fff0e8',bd:'#f7c9aa'};
  if(p>=1)   return {c:'#e83a3a',bg:'#ffeaea',bd:'#f7b8b8'};
  return             {c:'#c00',  bg:'#fff0f0',bd:'#f7b8b8'};
};
const gpaCol = g => {
  if(g==null) return '#9691b0';
  if(g>=3.6)  return '#05b67a';
  if(g>=3.2)  return '#2e78e8';
  if(g>=2.5)  return '#e8900c';
  return '#e83a3a';
};
const rankLabel = cpa => {
  if(cpa==null) return '—';
  if(cpa>=3.6)  return 'Xuất sắc';
  if(cpa>=3.2)  return 'Giỏi';
  if(cpa>=2.5)  return 'Khá';
  if(cpa>=2.0)  return 'Trung bình khá';
  return 'Trung bình';
};
const rankColors = cpa => {
  if(cpa==null) return {c:'#9691b0',bg:'#f3f2f8',bd:'#d5d2e4'};
  if(cpa>=3.6)  return {c:'#05a36d',bg:'#dcf7ee',bd:'#b3edd9'};
  if(cpa>=3.2)  return {c:'#2e78e8',bg:'#e8f1ff',bd:'#b8d0f7'};
  if(cpa>=2.5)  return {c:'#c87c00',bg:'#fff3dc',bd:'#f7d898'};
  return              {c:'#e83a3a',bg:'#ffeaea',bd:'#f7b8b8'};
};

let _uid=1; const uid=()=>'c_'+(_uid++);

/* ══════════════════════════════════════════════
   INITIAL DATA
══════════════════════════════════════════════ */
const INIT_PROFILE = {
  name: 'Nguyễn Văn A',
  studentId: 'XXXXXXXX',
  school: 'Đại học Bách khoa Hà Nội',
  faculty: 'Kỹ thuật Cơ khí',
  major: 'Kỹ thuật Cơ điện tử',
  year: 'K68 (2023 – 2028)',
  email: 'example@student.hust.edu.vn',
  phone: '',
  avatar: null,
  totalCreditsRequired: 145,
};

const INIT_SEMS = [
  { id:'2024.1', status:'completed', courses:[

/* ══════════════════════════════════════════════

══════════════════════════════════════════════ */
const calcGPA   = cs => { const v=cs.filter(c=>c.credits>0&&c.grade&&c.grade!=='-'&&GP[c.grade]!=null); if(!v.length) return null; const pts=v.reduce((s,c)=>s+GP[c.grade]*c.credits,0), tc=v.reduce((s,c)=>s+c.credits,0); return tc?pts/tc:null; };
const earnedCr  = cs => cs.filter(c=>c.credits>0&&c.grade&&c.grade!=='-').reduce((s,c)=>s+c.credits,0);
const plannedCr = cs => cs.filter(c=>c.credits>0).reduce((s,c)=>s+c.credits,0);
const buildTimeline = sems => { let pts=0,cr=0; return sems.filter(s=>s.status==='completed').map(s=>{ const v=s.courses.filter(c=>c.credits>0&&c.grade&&c.grade!=='-'&&GP[c.grade]!=null); pts+=v.reduce((a,c)=>a+GP[c.grade]*c.credits,0); cr+=v.reduce((a,c)=>a+c.credits,0); return {id:s.id,semGPA:calcGPA(s.courses),cumCPA:cr?pts/cr:null,cumCr:cr}; }); };
const getInitials = name => name.split(' ').filter(Boolean).slice(-2).map(w=>w[0]).join('').toUpperCase();

const Toast = ({msg,onDone}) => { useEffect(()=>{const t=setTimeout(onDone,2400);return()=>clearTimeout(t);},[]);return <div className="toast">{msg}</div>; };

const GBadge = ({grade,onClick,small=false}) => {
  const {c,bg,bd} = gradeColor(grade);
  return <span className="grade-chip" onClick={onClick} style={{color:c,background:bg,borderColor:bd,fontSize:small?10:11,padding:small?'1px 5px':'2px 7px',minWidth:small?28:34}}>{grade||'—'}</span>;
};

const CPARing = ({cpa,size=128}) => {
  const [anim,setAnim]=useState(null);
  useEffect(()=>{const t=setTimeout(()=>setAnim(cpa),320);return()=>clearTimeout(t);},[cpa]);
  const R=size*.36,C=2*Math.PI*R,pct=anim!=null?Math.min(anim/4,1):0,off=C*(1-pct),col=gpaCol(cpa);
  return (
    <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)',display:'block'}}>
        <circle cx={size/2} cy={size/2} r={R} fill="none" stroke="var(--bg2)" strokeWidth={size*.065}/>
        <circle cx={size/2} cy={size/2} r={R} fill="none" stroke={col} strokeWidth={size*.065} strokeLinecap="round"
          strokeDasharray={C} strokeDashoffset={off}
          style={{transition:'stroke-dashoffset 1.9s cubic-bezier(.4,0,.2,1),stroke .5s'}}/>
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
        <span style={{fontFamily:'var(--mono)',fontSize:size*.185,fontWeight:700,color:col,lineHeight:1}}>{cpa!=null?cpa.toFixed(2):'—'}</span>
        <span style={{fontSize:size*.074,color:'var(--muted)',marginTop:3,letterSpacing:'.1em',fontWeight:600}}>CPA</span>
      </div>
    </div>
  );
};

const GPABars = ({sems}) => {
  const H=72;
  return (
    <div className="bars-wrap" style={{height:H+34}}>
      {sems.map(s=>{
        const g=calcGPA(s.courses),h=g!=null?Math.max(4,Math.round((g/4)*H)):0,col=gpaCol(g);
        return (
          <div key={s.id} className="bar-col">
            <span className="bar-val" style={{color:col}}>{g!=null?g.toFixed(2):'—'}</span>
            <div className="bar-bg" style={{height:H}}>
              <div className="bar-fill" style={{height:h,background:`linear-gradient(180deg,${col} 0%,${col}66 100%)`}}/>
            </div>
            <span className="bar-label">{s.id.replace('20','')}</span>
          </div>
        );
      })}
    </div>
  );
};

/* ══════════════════════════════════════════════

      {editC&&<EditCourseModal course={editC} semId={sem.id} onSave={c=>{onEditCourse(sem.id,c);setEditC(null);}} onDelete={(id,sid)=>{onDeleteCourse(sid,id);setEditC(null);}} onClose={()=>setEditC(null)}/>}
      {addC&&<AddCourseModal semId={sem.id} onSave={c=>onAddCourse(sem.id,c)} onClose={()=>setAddC(false)}/>}

          {l:'TB TC/kỳ còn lại',v:plan.length?Math.round(remCr/plan.length):'—',c:'var(--yellow)',bg:'linear-gradient(135deg,var(--yellow-lt),#fde8b0)'},

      {/* Future plan */}
      <div className="card" style={{padding:'20px 24px',boxShadow:'var(--shadow-sm)'}}>
        <div className="section-label">Tổng quan kế hoạch tương lai</div>

const HistoryTab = ({sems,setSems}) => {
  const [toast,setToast]=useState(null);
  const [q,setQ]=useState('');
  const done=sems.filter(s=>s.status==='completed');
  const allDone=done.flatMap(s=>s.courses);
  const cpa=calcGPA(allDone),totalCr=earnedCr(allDone);

  const del=(semId,cid)=>{setSems(p=>p.map(s=>s.id!==semId?s:{...s,courses:s.courses.filter(c=>c.id!==cid)}));setToast('🗑️ Đã xóa môn học');};
  const add=(semId,c)=>{setSems(p=>p.map(s=>s.id!==semId?s:{...s,courses:[...s.courses,c]}));setToast('➕ Đã thêm môn học');};

            <div key={s.l}><div style={{fontSize:10,fontWeight:700,color:'rgba(0,0,0,.4)',textTransform:'uppercase',letterSpacing:'.07em'}}>{s.l}</div><div style={{fontFamily:'var(--mono)',fontSize:20,fontWeight:700,color:s.c,marginTop:2}}>{s.v}</div></div>

};

/* ══════════════════════════════════════════════
   PLANNER TAB
══════════════════════════════════════════════ */
const PlannerTab = ({sems,setSems}) => {
  const [drag,setDrag]=useState(null);
  const [addSem,setAddSem]=useState(false);
  const [toast,setToast]=useState(null);
  const plan=sems.filter(s=>s.status==='planned');
  const rem=plan.flatMap(s=>s.courses).filter(c=>c.credits>0).reduce((a,c)=>a+c.credits,0);
  const onDragStart=useCallback((cid,fsid)=>setDrag({cid,fsid}),[]);
  const onDrop=useCallback(tsid=>{
    if(!drag||drag.fsid===tsid){setDrag(null);return;}
    setSems(prev=>{
      const course=prev.find(s=>s.id===drag.fsid)?.courses.find(c=>c.id===drag.cid);
      if(!course) return prev;
      return prev.map(s=>{
        if(s.id===drag.fsid) return {...s,courses:s.courses.filter(c=>c.id!==drag.cid)};
        if(s.id===tsid) return {...s,courses:[...s.courses,course]};
        return s;
      });
    });
    setDrag(null);setToast('↔️ Đã di chuyển môn học');
  },[drag,setSems]);
  useEffect(()=>{const u=()=>setDrag(null);window.addEventListener('dragend',u);return()=>window.removeEventListener('dragend',u);},[]);
  const onGradeChange=useCallback((cid,sid,grade)=>setSems(prev=>prev.map(s=>s.id!==sid?s:{...s,courses:s.courses.map(c=>c.id!==cid?c:{...c,grade})})),[setSems]);
  const editC=(sid,c)=>{setSems(p=>p.map(s=>s.id!==sid?s:{...s,courses:s.courses.map(x=>x.id!==c.id?x:c)}));setToast('✅ Đã cập nhật');};
  const addC=(sid,c)=>{setSems(p=>p.map(s=>s.id!==sid?s:{...s,courses:[...s.courses,c]}));setToast('➕ Đã thêm môn');};
  const delC=(sid,cid)=>{setSems(p=>p.map(s=>s.id!==sid?s:{...s,courses:s.courses.filter(c=>c.id!==cid)}));setToast('🗑️ Đã xóa môn');};
  const delS=sid=>{if(!window.confirm(`Xóa học kỳ ${sid}?`))return;setSems(p=>p.filter(s=>s.id!==sid));setToast('🗑️ Đã xóa học kỳ');};
  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div className="anim" style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap',background:'linear-gradient(90deg,var(--accent2-lt),rgba(255,255,255,0))',border:'1px solid rgba(0,180,200,.2)',borderRadius:13,padding:'12px 18px',fontSize:12,color:'var(--text2)'}}>
        <span style={{fontSize:18}}>💡</span>
        <span style={{flex:1}}><strong>Kéo thả</strong> môn học giữa các kỳ để sắp xếp lại · Click badge điểm <strong>—</strong> để nhập điểm dự kiến · ✏️ chỉnh sửa thông tin môn · Còn <strong style={{color:'var(--accent)'}}>{rem} TC</strong> trong kế hoạch</span>
        <button className="btn btn-primary btn-sm" onClick={()=>setAddSem(true)}>+ Thêm học kỳ</button>
      </div>
      <div className="sem-grid">
        {plan.map(sem=>(
          <PlannedCard key={sem.id} sem={sem}
            onDragStart={onDragStart} onDrop={onDrop} onGradeChange={onGradeChange} draggingId={drag?.cid}
            onEditCourse={editC} onAddCourse={addC} onDeleteCourse={delC} onDeleteSem={delS}/>
        ))}
      </div>
      {addSem&&<AddSemModal existingIds={sems.map(s=>s.id)} onSave={s=>{setSems(p=>[...p,s]);setToast('🗓️ Đã thêm học kỳ');}} onClose={()=>setAddSem(false)}/>}
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
};

            <div style={{fontSize:26,fontWeight:800,color:'var(--text)',letterSpacing:'-.02em',lineHeight:1.1}}>{profile.name||'Chưa đặt tên'}</div>
            <div style={{fontSize:13,color:'var(--text2)',marginTop:4}}>{profile.studentId} · {profile.major}</div>
            <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{profile.school}</div>
            <div style={{display:'flex',gap:10,marginTop:12,flexWrap:'wrap',alignItems:'center'}}>
              <span style={{fontFamily:'var(--mono)',fontSize:15,fontWeight:700,color:gpaCol(cpa),background:'rgba(255,255,255,.7)',border:'1px solid rgba(91,74,247,.2)',padding:'4px 12px',borderRadius:99}}>CPA {cpa?.toFixed(2)||'—'}</span>
              <span className="rank-pill" style={{background:rc.bg,border:`1px solid ${rc.bd}`,color:rc.c,fontSize:11}}>{rankLabel(cpa)}</span>
            </div>
          </div>
          <button className="btn btn-primary" onClick={()=>setEditing(true)}>✏️ Chỉnh sửa hồ sơ</button>
        </div>
      </div>

      {/* Academic stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12}}>
        {[
          {icon:'🏆',label:'Xếp loại học lực',value:rankLabel(cpa),c:rc.c},
          {icon:'📚',label:'Tín chỉ tích lũy',value:`${totalCr} TC`,c:'var(--accent)'},
          {icon:'⭐',label:'Kỳ xuất sắc nhất',value:bestSem?.id||'—',c:'#05b67a'},
          {icon:'📅',label:'Số kỳ đã hoàn thành',value:`${done.length} kỳ`,c:'var(--text)'},
        ].map(s=>(
          <div key={s.label} className="info-chip">
            <div className="info-chip-icon">{s.icon}</div>
            <div>
              <div className="info-chip-label">{s.label}</div>
              <div className="info-chip-value" style={{color:s.c}}>{s.value}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Personal info */}
      <div className="card" style={{padding:'20px 24px',boxShadow:'var(--shadow-sm)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div className="section-label" style={{marginBottom:0}}>Thông tin cá nhân</div>
          <button className="btn btn-secondary btn-sm" onClick={()=>setEditing(true)}>✏️ Sửa</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:10}}>
          {[
            {icon:'🏫',label:'Trường',value:profile.school},
            {icon:'🏛️',label:'Khoa / Viện',value:profile.faculty},
            {icon:'🎓',label:'Ngành học',value:profile.major},
            {icon:'📆',label:'Khóa',value:profile.year},
            {icon:'📧',label:'Email',value:profile.email},
            {icon:'📱',label:'Điện thoại',value:profile.phone||'Chưa cập nhật'},
            {icon:'🆔',label:'MSSV',value:profile.studentId},
            {icon:'📋',label:'TC yêu cầu',value:`${profile.totalCreditsRequired} TC`},
          ].map(row=>(
            <div key={row.label} className="info-chip">
              <div className="info-chip-icon">{row.icon}</div>
              <div style={{minWidth:0}}>
                <div className="info-chip-label">{row.label}</div>
                <div className="info-chip-value" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{row.value||'—'}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {editing&&<ProfileModal profile={profile} onSave={p=>{setProfile(p);setToast('✅ Đã cập nhật hồ sơ');}} onClose={()=>setEditing(false)}/>}
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
    </div>
  );
};

/* ══════════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════════ */
function App() {
  const [sems,setSems]=useState(INIT_SEMS);
  const [profile,setProfile]=useState(INIT_PROFILE);
  const [tab,setTab]=useState('dashboard');
  const [tabKey,setTabKey]=useState(0);
  const changeTab=t=>{setTab(t);setTabKey(k=>k+1);};

  const cpa=useMemo(()=>calcGPA(sems.filter(s=>s.status==='completed').flatMap(s=>s.courses)),[sems]);
  const cr=useMemo(()=>earnedCr(sems.filter(s=>s.status==='completed').flatMap(s=>s.courses)),[sems]);
  const plan=sems.filter(s=>s.status==='planned');
  const initials=getInitials(profile.name);

  const TABS=[
    {id:'dashboard',icon:'⊞',label:'Tổng quan'},
    {id:'history',  icon:'◎',label:'Kết quả học tập'},
    {id:'planner',  icon:'◈',label:'Kế hoạch học tập'},
    {id:'profile',  icon:'◉',label:'Hồ sơ cá nhân'},
  ];

  return (
    <div className="layout">
      {/* Sidebar */}
      <aside className="sidebar">
        <div className="sidebar-top">
          <div className="logo">
            <div className="logo-mark">✦</div>
            <div className="logo-name">EduTrack</div>
          </div>
          {/* Profile mini card */}
          <div className="profile-card" onClick={()=>changeTab('profile')}>
            <div style={{display:'flex',gap:10,alignItems:'center'}}>
              <div className="profile-avatar" style={{width:42,height:42,borderRadius:11,fontSize:16}}>
                {profile.avatar?<img src={profile.avatar} style={{width:'100%',height:'100%',objectFit:'cover'}} alt=""/>:initials}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div className="profile-name" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{profile.name}</div>
                <div className="profile-detail" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{profile.major}</div>
              </div>
            </div>
            <div className="profile-gpa-row">
              <span className="profile-gpa-badge">CPA {cpa?.toFixed(2)||'—'}</span>
              <span style={{fontSize:10,color:'var(--text2)',fontWeight:500}}>{rankLabel(cpa)}</span>
            </div>
          </div>

          <div className="nav-section-label">Menu</div>
          {TABS.map(t=>(
            <button key={t.id} className={`nav-item${tab===t.id?' active':''}`} onClick={()=>changeTab(t.id)}>
              <span className="nav-icon">{t.icon}</span>
              {t.label}
              {t.id==='planner'&&plan.length>0&&<span className="nav-badge">{plan.length}</span>}
            </button>
          ))}
        </div>

        <div className="sidebar-stats">
          <div className="section-label" style={{marginBottom:10}}>Thống kê nhanh</div>
          {[
            {label:'CPA',value:cpa?.toFixed(2)||'—',c:gpaCol(cpa)},
            {label:'Tín chỉ tích lũy',value:`${cr} TC`,c:'var(--text2)'},
            {label:'Kỳ hoàn thành',value:`${sems.filter(s=>s.status==='completed').length} kỳ`,c:'var(--text2)'},
            {label:'Xếp loại',value:rankLabel(cpa),c:gpaCol(cpa)},
          ].map(s=>(
            <div key={s.label} className="sidebar-stat-row">
              <span className="sidebar-stat-label">{s.label}</span>
              <span className="sidebar-stat-value" style={{color:s.c}}>{s.value}</span>
            </div>
          ))}
        </div>
      </aside>

      {/* Main content */}
      <div className="content">
        <header className="topbar">
          <div className="topbar-title">{TABS.find(t=>t.id===tab)?.label}</div>
          <div className="topbar-right">
            <div style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--muted)',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:7,padding:'5px 12px'}}>
              {profile.year}
            </div>
          </div>
        </header>
        <div style={{flex:1,overflow:'auto'}}>
          <div className="main" key={tabKey}>
            {tab==='dashboard'&&<DashboardTab sems={sems} profile={profile}/>}
            {tab==='history'  &&<HistoryTab sems={sems} setSems={setSems}/>}
            {tab==='planner'  &&<PlannerTab sems={sems} setSems={setSems}/>}
            {tab==='profile'  &&<ProfileTab profile={profile} setProfile={setProfile} sems={sems}/>}
          </div>
        </div>
        <footer style={{borderTop:'1px solid var(--border)',padding:'10px 32px',background:'var(--surface)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:10,color:'var(--muted2)'}}>EduTrack · Hệ điểm 4.0</span>
          <span style={{fontSize:10,color:'var(--muted2)'}}>A/A+=4.0 · B+=3.5 · B=3.0 · C+=2.5 · C=2.0 · D+=1.5 · D=1.0 · F=0 · Môn 0TC không tính GPA</span>
        </footer>
      </div>
    </div>
  );
}

try {
  document.getElementById('root').innerHTML='';
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
} catch(e) {
  document.getElementById('root').innerHTML=`<div style="padding:40px;color:#e83a3a;font-family:system-ui;font-size:14px">Lỗi: ${e.message}</div>`;
  console.error(e);
}
</script>
</body>
</html>
